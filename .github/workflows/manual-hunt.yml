name: manual-hunt

# Run pipeline B by hand against cities you name, ignoring the planner's flags.
# Useful to immediately check a city you have a hunch about.

on:
  workflow_dispatch:
    inputs:
      cities:
        description: "Comma-separated cities (must match config.py keys exactly)"
        required: true
        type: string
      force_digest:
        description: "Email results immediately instead of waiting for digest day"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  hunt:
    runs-on: ubuntu-latest
    env:
      APIFY_TOKEN:       ${{ secrets.APIFY_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SMTP_HOST:         ${{ secrets.SMTP_HOST }}
      SMTP_PORT:         ${{ secrets.SMTP_PORT }}
      SMTP_USER:         ${{ secrets.SMTP_USER }}
      SMTP_PASS:         ${{ secrets.SMTP_PASS }}
      EMAIL_TO:          ${{ secrets.EMAIL_TO }}
      GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
      LLM_PROVIDER:      ${{ vars.LLM_PROVIDER }}
      EMAIL_FROM:        ${{ secrets.EMAIL_FROM }}
      HUNT_CITIES:       ${{ github.event.inputs.cities }}
      FORCE_DIGEST:      ${{ github.event.inputs.force_digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Hunt named cities
        run: python hunt.py
      - name: Persist state
        run: |
          git config user.name "deal-hunter"
          git config user.email "actions@users.noreply.github.com"
          git add state/
          git commit -m "manual hunt state [skip ci]" || echo "no changes"
          git push
