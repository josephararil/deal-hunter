name: daily

# Daily diamond finder: two-stage LLM gate, emails immediately on genuine finds.
# No hotel crawling, no Apify. Dormant Apify pipeline lives in _dormant/ and does not run here.

on:
  schedule:
    - cron: "0 6 * * *"     # 06:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deal-hunter-daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
      LLM_PROVIDER:      ${{ vars.LLM_PROVIDER }}
      SMTP_HOST:         ${{ secrets.SMTP_HOST }}
      SMTP_PORT:         ${{ secrets.SMTP_PORT }}
      SMTP_USER:         ${{ secrets.SMTP_USER }}
      SMTP_PASS:         ${{ secrets.SMTP_PASS }}
      EMAIL_TO:          ${{ secrets.EMAIL_TO }}
      EMAIL_FROM:        ${{ secrets.EMAIL_FROM }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      - name: Run find_city_anomalies.py (planner + web search)
        run: python find_city_anomalies.py

      - name: Persist state
        run: |
          git config user.name "deal-hunter"
          git config user.email "actions@users.noreply.github.com"
          git add state/
          git commit -m "update state [skip ci]" || echo "no changes"
          git push
