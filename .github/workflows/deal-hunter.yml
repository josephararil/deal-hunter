name: deal-hunter

on:
  schedule:
    - cron: "0 6 * * *"     # 06:00 UTC daily (crawl daily; email only on DIGEST_WEEKDAY)
  workflow_dispatch:
    inputs:
      force_digest:
        description: "Send the digest now regardless of weekday"
        type: boolean
        default: false

permissions:
  contents: write             # allow committing seen.json / pending_digest.json back

concurrency:
  group: deal-hunter
  cancel-in-progress: false

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run deal hunter
        run: python deal_hunter.py
        env:
          APIFY_TOKEN:       ${{ secrets.APIFY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST:         ${{ secrets.SMTP_HOST }}
          SMTP_PORT:         ${{ secrets.SMTP_PORT }}
          SMTP_USER:         ${{ secrets.SMTP_USER }}
          SMTP_PASS:         ${{ secrets.SMTP_PASS }}
          EMAIL_TO:          ${{ secrets.EMAIL_TO }}
          EMAIL_FROM:        ${{ secrets.EMAIL_FROM }}
          FORCE_DIGEST:      ${{ github.event.inputs.force_digest }}

      - name: Persist state
        run: |
          git config user.name "deal-hunter"
          git config user.email "actions@users.noreply.github.com"
          git add seen.json pending_digest.json
          git commit -m "update state [skip ci]" || echo "no changes"
          git push
