name: signals-only

# Manual run: refresh the seasonal baseline and generate city signals.
# No hotel crawling, no email — just updates state/city_signals.md so you can see
# where to look. The cheap "just tell me where, don't spend" button.

on:
  workflow_dispatch:
    inputs:
      skip_baseline:
        description: "Skip the baseline refresh (faster/cheaper, signals only)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: deal-hunter-signals
  cancel-in-progress: false

jobs:
  signals:
    runs-on: ubuntu-latest
    env:
      APIFY_TOKEN:       ${{ secrets.APIFY_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
      LLM_PROVIDER:      ${{ vars.LLM_PROVIDER }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      - name: Update seasonal baseline (cheap, no LLM)
        if: ${{ github.event.inputs.skip_baseline != 'true' }}
        run: python baseline_sampler.py

      - name: Generate city signals
        run: python find_city_anomalies.py

      - name: Persist state
        run: |
          git config user.name "deal-hunter"
          git config user.email "actions@users.noreply.github.com"
          git add state/
          git commit -m "signals-only run [skip ci]" || echo "no changes"
          git push